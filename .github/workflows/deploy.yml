name: ML CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            # Install dependencies
            sudo apt update -y
            sudo apt install git docker.io docker-compose -y || true

            # Clone repo if not exists
            if [ ! -d "ml-crop-prediction-cicd-project" ]; then
              git clone https://github.com/lekkalahyma/ml-crop-prediction-cicd-project.git
            fi

            cd ml-crop-prediction-cicd-project

            # Pull latest code
            git pull origin main

            # Restart containers
            sudo docker-compose down || true
            sudo docker-compose up -d --build

            echo "✅ Deployment Successful!"
