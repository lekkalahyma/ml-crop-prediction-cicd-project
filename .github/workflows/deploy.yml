name: ML CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            # Install dependencies
            sudo apt update -y
            sudo apt install git docker.io docker-compose -y || true

            # Clone repo if not exists
            if [ ! -d "ml-crop-prediction-cicd-project" ]; then
              git clone https://github.com/lekkalahyma/ml-crop-prediction-cicd-project.git
            fi

            cd ml-crop-prediction-cicd-project

            # Pull latest code
            git pull origin main

            # FIXED Docker Compose (works on most EC2)
            sudo docker-compose down || true
            sudo docker-compose up -d --build
        
